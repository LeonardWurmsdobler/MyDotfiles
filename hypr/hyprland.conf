monitor=,preferred,auto,1

$terminal = ghostty
$browser = chromium
$filemanager = dolphin
$editor = nvim
$launcher = wofi --show drun

exec-once = waybar
#exec-once = bash -c 'wal -R; mako --config /home/leonard/.cache/wal/mako-config'
exec-once = swaync
exec-once = elephant
exec-once = awww-daemon
exec-once = awww img ~/Pictures/Lake.gif 
#exec-once = mpvpaper -p -o "no-audio --loop" HDMI-A-2 ~/Downloads/black-hole.3840x2160.mp4 &
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swayosd-server --top-margin 0.943
exec-once = eww daemon
exec-once = eww open control-center

env = __GL_THREADED_OPTIMIZATIONS,0

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = QT_QPA_PLATFORMTHEME,qt6ct

general {
    col.active_border = rgba(7fbbb3cc)
    col.inactive_border = rgba(47525866)
    border_size = 2
    gaps_in = 6
    gaps_out = 12
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 0.92
    inactive_opacity = 0.80

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = yes
    bezier = forest, 0.05, 0.9, 0.1, 1.05
    bezier = mist, 0.25, 0.46, 0.45, 0.94
    bezier = gentle, 0.43, 0.195, 0.02, 1.0
    bezier = snap, 0.79, 0.14, 0.15, 0.86

    animation = windows, 1, 3, forest, slide
    animation = windowsIn, 1, 2, mist, popin 85%
    animation = windowsOut, 1, 1, snap, popin 80%
    animation = fade, 1, 2, gentle
    animation = fadeOut, 1, 1, gentle
    animation = workspaces, 1, 5, forest, slide
}

input {
    kb_layout = gb
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    mouse_move_enables_dpms = true   # wake monitor on mouse move
    key_press_enables_dpms = true
}

dwindle {
    preserve_split = true
}


layerrule = match:namespace ^(wofi)$, blur on
layerrule = match:namespace ^(wofi)$, ignore_alpha 0.5
layerrule = blur on, match:namespace wofi
#layerrule = blur on, wofi
#layerrule = ignorezero, wofi


windowrule = opacity 1.0 override 1.0 override, match:class org.vinegarhq.Sober
windowrule = float on, match:class ^(smile)$


$mod = SUPER

bind = $mod, Return, exec, ghostty
bind = $mod, W, killactive
bind = $mod, F, fullscreen
bind = $mod, T, togglefloating
bind = $mod SHIFT, T, centerwindow

bind = $mod SHIFT, F, exec, ghostty -e yazi
bind = $mod SHIFT, Return, exec, chromium
bind = $mod CTRL, E, exec, smile
bind = $mod, F2, exec, ghostty -e btop

bind = $mod, Space, exec, wofi --show drun
bind = $mod, slash, exec, ~/.config/wofi/websearch.sh
bind = $mod, U, exec, ~/.config/wofi/wallpaper.sh
bind = $mod, X, exec, ~/.config/wofi/power.sh
#bind = $mod, equal, exec, ~/.config/wofi/calc.sh
#bind = $mod, V, exec, ~/.config/wofi/clipboard.sh

#bind = $mod, Space, exec, anyrun
bind = $mod, V, exec, cliphist list | walker --dmenu | cliphist decode | wl-copy
bind = $mod, Escape, exec, hyprlock

#bind = $mod, X, exec, wlogout
bind = $mod, I, exec, ~/.config/eww/scripts/sidebar-toggle.sh
bind = $mod, C, exec, ~/.config/eww/scripts/cc-toggle.sh
bind = $mod, P, pseudo,

bind = , Print, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = $mod, Print, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = CTRL, Home, exec, hyprshot -m region -o ~/Pictures/Screenshots

bind = $mod SHIFT, C, exec, hyprpicker | wl-copy

binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioPlay, exec, swayosd-client --output-volume mute-toggle

binde = $mod, comma, resizeactive, -30 0
binde = $mod, period, resizeactive, 30 0

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,


bind = SUPER, left, movewindoworgroup, l
bind = SUPER, right, movewindoworgroup, r
bind = SUPER, up, movewindoworgroup, u
bind = SUPER, down, movewindoworgroup, d


bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

bind = $mod, 6, movetoworkspacesilent, 1
bind = $mod, 7, movetoworkspacesilent, 2
bind = $mod, 8, movetoworkspacesilent, 3

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

